services:
  db:
    container_name: bdaily-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bdaily
      POSTGRES_PASSWORD: bdaily_dev
      POSTGRES_DB: bdaily
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdaily"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: bdaily-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://bdaily:bdaily_dev@bdaily-db:5432/bdaily
      JWT_SECRET: dev-secret-change-in-production
      PORT: 3001
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  web:
    container_name: bdaily-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages

volumes:
  pgdata:
