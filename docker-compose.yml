services:
  db:
    container_name: bdaily-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bdaily
      POSTGRES_PASSWORD: bdaily_dev
      POSTGRES_DB: bdaily
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdaily"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailcatcher:
    container_name: bdaily-mail
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  api:
    container_name: bdaily-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      DATABASE_URL: postgresql://bdaily:bdaily_dev@bdaily-db:5432/bdaily
      JWT_SECRET: dev-secret-change-in-production
      PORT: 8091
      NODE_ENV: development
      SMTP_HOST: bdaily-mail
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@bdaily.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  web:
    container_name: bdaily-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:80"
    environment:
      VITE_API_URL: http://localhost:8091
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages

volumes:
  pgdata:
