name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @bdaily/shared build

      - name: Generate Prisma client
        run: pnpm --filter @bdaily/api db:generate

      - name: Run ESLint
        run: pnpm lint:eslint

      - name: Run Prettier check
        run: pnpm lint:prettier

      - name: Type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/"
          retention-days: 7
